version: '3'

vars:
  ROOT:
    sh: pwd
  BIN_DIR: '{{.ROOT}}/bin'
  CONTROLLER_GEN: '{{.ROOT}}/bin/controller-gen'
  CONTROLLER_GEN_VERSION: v0.16.5
  GOLANGCI_LINT: '{{.ROOT}}/bin/golangci-lint'
  GOLANGCI_LINT_VERSION: v1.61.0

  AGENT_IMAGE: '{{.AGENT_IMAGE | default "ghcr.io/tsamsiyu/pontifex-agent:dev"}}'
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "ghcr.io/tsamsiyu/pontifex-operator:dev"}}'
  PLATFORM: '{{.PLATFORM | default "linux/amd64"}}'

  HEADER_FILE: '{{.ROOT}}/hack/boilerplate.go.txt'
  CRD_OUT_DIR: '{{.ROOT}}/helm/operator/crds'
  RBAC_OUT_DIR: '{{.ROOT}}/helm/operator/rbac'

  MODULES:
  - api
  - apps/agent
  - apps/operator

tasks:
  default:
    desc: List available tasks
    cmds:
    - task --list

  # ── internal tool installers ────────────────────────────────────────────────

  tools:controller-gen:
    internal: true
    cmds:
    - mkdir -p {{.BIN_DIR}}
    - GOBIN={{.BIN_DIR}} go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_GEN_VERSION}}
    status:
    - test -x {{.CONTROLLER_GEN}}

  tools:golangci-lint:
    internal: true
    cmds:
    - mkdir -p {{.BIN_DIR}}
    - GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
    - test -x {{.GOLANGCI_LINT}}

  # ── code generation ─────────────────────────────────────────────────────────

  gen:deepcopy:all:
    desc: Generate DeepCopy methods for api/v1alpha1 types
    deps: [tools:controller-gen]
    cmds:
    - >-
      cd api && {{.CONTROLLER_GEN}}
      object:headerFile={{.HEADER_FILE}}
      paths=./...

  gen:crds:all:
    desc: Generate CRD manifests into helm/operator/crds/
    deps: [tools:controller-gen]
    cmds:
    - mkdir -p {{.CRD_OUT_DIR}}
    - >-
      cd api && {{.CONTROLLER_GEN}}
      crd
      paths=./...
      output:crd:artifacts:config={{.CRD_OUT_DIR}}

  gen:rbac:all:
    desc: Generate RBAC manifests for the operator into helm/operator/rbac/
    deps: [tools:controller-gen]
    cmds:
    - mkdir -p {{.RBAC_OUT_DIR}}
    - >-
      cd apps/operator && {{.CONTROLLER_GEN}}
      rbac:roleName=operator-role
      paths=./...
      output:rbac:artifacts:config={{.RBAC_OUT_DIR}}

  # ── testing ─────────────────────────────────────────────────────────────────

  test:operator:
    desc: go test ./... in apps/operator
    cmds:
    - cd apps/operator && go test ./...

  test:agent:
    desc: go test ./... in apps/agent
    cmds:
    - cd apps/agent && go test ./...

  # ── linting ─────────────────────────────────────────────────────────────────

  lint:all:
    desc: golangci-lint across all modules
    deps: [tools:golangci-lint]
    cmds:
    - for: { var: MODULES }
      cmd: cd {{.ITEM}} && {{.GOLANGCI_LINT}} run ./...

  # ── docker ──────────────────────────────────────────────────────────────────

  docker:operator:build:
    desc: Build operator image (OPERATOR_IMAGE=… PLATFORM=… to override)
    cmds:
    - docker build --platform {{.PLATFORM}} -t {{.OPERATOR_IMAGE}} -f apps/operator/Dockerfile .

  docker:agent:build:
    desc: Build agent image (AGENT_IMAGE=… PLATFORM=… to override)
    cmds:
    - docker build --platform {{.PLATFORM}} -t {{.AGENT_IMAGE}} -f apps/agent/Dockerfile .
